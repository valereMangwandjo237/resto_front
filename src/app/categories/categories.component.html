<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-dark">
      <i class="fas fa-tags me-2 text-gold"></i> Catégories du Menu
    </h2>
    <button class="btn btn-gold shadow-sm" (click)="Ajouter()" data-bs-toggle="modal" data-bs-target="#addCategoryModal">
      <i class="fas fa-plus-circle me-2"></i> Nouvelle Catégorie
    </button>
  </div>

  <div class="row g-4">
    <div class="col-md-4" *ngFor="let cat of listeCat">
      <div class="card category-card border-0 shadow-sm h-100">
        <div class="card-body text-center p-4">
          <div class="icon-box mb-3 mx-auto bg-soft-primary">
            <i class="{{ cat.icon }} text-primary"></i>
          </div>
          <h4 class="fw-bold mb-1">{{ cat.nom }}</h4>
          <p class="text-muted mb-3">{{ cat.nombre }} articles au menu</p>
          <div class="d-flex justify-content-center gap-2">
            <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal"
              data-bs-target="#addCategoryModal"
              (click)="Editer(cat)"
            >
              <i class="fas fa-edit"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger" (click)="confirmerSuppression(cat)"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div
  class="modal fade" id="addCategoryModal"
  tabindex="-1" aria-hidden="true"
  data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
>
  <div class="modal-dialog modal-lg">
    <div class="modal-content border-0">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">
          {{modeEdition ? 'Modifier la catégorie' : 'Nouvelle Catégorie'}}
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form class="row g-3">
          <div class="col-md-12">
            <label class="form-label fw-bold">Nom de la catégorie</label>
            <input type="text" name="cateogryName" class="form-control"
              placeholder="Ex: Mets Européens"
              [(ngModel)]="catSelectionne.nom">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Fermer</button>
        <button type="button" class="btn px-4" [ngClass]="modeEdition ? 'btn-primary' : 'btn-gold'">
          {{modeEdition ? 'Modifier' : 'Ajouter'}} la catégorie
        </button>
      </div>
    </div>
  </div>
</div>
