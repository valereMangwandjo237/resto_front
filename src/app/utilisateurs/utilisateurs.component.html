<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-dark"><i class="fas fa-users-cog me-2 text-gold"></i> Gestion des Utilisateurs</h2>
    <button class="btn btn-gold shadow-sm"  data-bs-toggle="modal" data-bs-target="#UserModal" (click)="Ajouter()">
      <i class="fas fa-plus me-2"></i> Nouvel Utilisateur
    </button>
  </div>

  <div class="col-md-8">
    <div class="input-group">
      <span class="input-group-text bg-white border-end-0 text-muted">
        <i class="fas fa-search"></i>
      </span>
      <input
        type="text"
        class="form-control border-start-0 ps-0"
        placeholder="Rechercher un utilisateur par nom, adresse ou rôle..."
        [(ngModel)]="searchTerm"
        (input)="filtrerUsers()"
      >
    </div>
  </div>

  <div class="card border-0 shadow-sm rounded-3">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="bg-light text-muted uppercase-text">
            <tr>
              <th class="ps-4">Nom</th>
              <th>Email</th>
              <th>Adresse</th>
              <th>Numéro</th>
              <th>Rôle</th>
              <th class="text-center">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let user of usersFiltres">
              <td class="ps-4">
                <div class="d-flex align-items-center">
                  <div class="avatar-circle me-3">{{ user.avatar }}</div>
                  <span class="fw-bold">{{ user.nom }}</span>
                </div>
              </td>
              <td>{{ user.email }}</td>
              <td>{{ user.adresse }}</td>
              <td>{{ user.numero }}</td>
              <td><span class="badge shadow-sm" [ngClass]="user.role === 'Gérant' ? 'bg-dark-restaurant' : 'bg-secondary'">{{ user.role }}</span></td>
              <td class="text-center">
                <div class="btn-group">
                  <button class="btn btn-sm btn-outline-primary me-2" data-bs-toggle="modal"
                    data-bs-target="#UserModal" title="Modifier"
                    (click)="Editer(user)"
                  >
                    <i class="fas fa-edit"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-danger" title="Supprimer" (click)="confirmerSuppression(user)"><i class="fas fa-trash"></i></button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div
  class="modal fade" id="UserModal"
  tabindex="-1" aria-hidden="true"
  data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
>
  <div class="modal-dialog modal-lg">
    <div class="modal-content border-0">
      <div class="modal-header" [ngClass]="modeEdition ? 'bg-primary text-white' : 'bg-dark text-white' ">
        <h5 class="modal-title">
          <i class="fas" [ngClass]="modeEdition ? 'fa-edit' : 'fa-plus-circle'"></i>
          {{ modeEdition ? 'Modifier l\'utilisateur' : 'Nouvel utilisateur' }}
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-bold">Nom</label>
            <input type="text" [(ngModel)]="userSelectionne.nom" name="nom" class="form-control" placeholder="Ex: KAMGA Yvan">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Adresse</label>
            <input type="text" [(ngModel)]="userSelectionne.adresse" name="adresse" class="form-control" placeholder="Biyem Assi">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Role</label>
            <select class="form-select" name="category" [(ngModel)]="userSelectionne.role">
              <option>Serveur</option>
              <option>Gérant</option>
              <option>Cuisinier</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Telephone</label>
            <input type="tel" [(ngModel)]="userSelectionne.numero" name="telephone" class="form-control">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Fermer</button>
        <button type="button" class="btn" [ngClass]="modeEdition ? 'btn-primary' : 'btn-gold'">
          {{ modeEdition ? 'Enregistrer les modifications' : 'Ajouter' }}
        </button>
      </div>
    </div>
  </div>
</div>
