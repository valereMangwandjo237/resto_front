<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-dark"><i class="fas fa-users-cog me-2 text-gold"></i> Gestion des Utilisateurs</h2>
    <button class="btn btn-gold shadow-sm">
      <i class="fas fa-plus me-2"></i> Nouvel Utilisateur
    </button>
  </div>

  <app-search-filter
    placeholderText="Chercher un employé..."
    (searchEvent)="filtrerUtilisateurs($event)">

    <span class="text-muted small">Total: 3</span>
  </app-search-filter>

  <div class="card border-0 shadow-sm rounded-3">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="bg-light text-muted uppercase-text">
            <tr>
              <th class="ps-4">Nom</th>
              <th>Adresse</th>
              <th>Numéro</th>
              <th>Rôle</th>
              <th class="text-center">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="ps-4">
                <div class="d-flex align-items-center">
                  <div class="avatar-circle me-3">JD</div>
                  <span class="fw-bold">Jean Dupont</span>
                </div>
              </td>
              <td>Cradat, Ngoaekele</td>
              <td>06 12 34 56 78</td>
              <td><span class="badge bg-dark-restaurant shadow-sm">Gérant</span></td>
              <td class="text-center">
                <div class="btn-group">
                  <button class="btn btn-sm btn-outline-info me-2" title="Visualiser"><i class="fas fa-eye"></i></button>
                  <button class="btn btn-sm btn-outline-primary me-2" title="Modifier"><i class="fas fa-edit"></i></button>
                  <button class="btn btn-sm btn-outline-danger" title="Supprimer"><i class="fas fa-trash"></i></button>
                </div>
              </td>
            </tr>

            <tr>
              <td class="ps-4">
                <div class="d-flex align-items-center">
                  <div class="avatar-circle bg-info me-3">SM</div>
                  <span class="fw-bold">Sophie Martin</span>
                </div>
              </td>
              <td>Rue Damas, Yaounde</td>
              <td>06 98 76 54 32</td>
              <td><span class="badge bg-secondary">Serveur</span></td>
              <td class="text-center">
                <div class="btn-group">
                  <button class="btn btn-sm btn-outline-info me-2"><i class="fas fa-eye"></i></button>
                  <button class="btn btn-sm btn-outline-primary me-2"><i class="fas fa-edit"></i></button>
                  <button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                </div>
              </td>
            </tr>

            <tr>
              <td class="ps-4">
                <div class="d-flex align-items-center">
                  <div class="avatar-circle bg-warning me-3">MK</div>
                  <span class="fw-bold">Marc Kassov</span>
                </div>
              </td>
              <td>Etoudi, Yaounde</td>
              <td>07 11 22 33 44</td>
              <td><span class="badge bg-success">Cuisinier</span></td>
              <td class="text-center">
                <div class="btn-group">
                  <button class="btn btn-sm btn-outline-info me-2"><i class="fas fa-eye"></i></button>
                  <button class="btn btn-sm btn-outline-primary me-2"><i class="fas fa-edit"></i></button>
                  <button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
